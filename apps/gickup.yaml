apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gickup
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/marcizhu/microk8s-nas.git
    targetRevision: HEAD
    path: apps/gickup
  destination:
    server: https://kubernetes.default.svc
    namespace: gickup
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
