apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jellyfin
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://jellyfin.github.io/jellyfin-helm
    chart: jellyfin
    targetRevision: 3.2.0
    helm:
      values: |
        replicaCount: 1
        image:
          pullPolicy: IfNotPresent
        persistence:
          config:
            enabled: true
            size: 5Gi
            storageClass: microk8s-hostpath
          media:
            enabled: true
            type: hostPath
            hostPath: /mnt/nas/Media
            readOnly: true
          cache:
            enabled: true
            type: pvc
            size: 10Gi
            storageClass: microk8s-hostpath
        ingress:
          enabled: true
          className: nginx
          annotations:
            nginx.ingress.kubernetes.io/proxy-body-size: "0"
            nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
            nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
          hosts:
            - host: jellyfin.nas-local.io
              paths:
                - path: /
                  pathType: Prefix
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 4000m
            memory: 4Gi
        extraEnvVars:
          - name: JELLYFIN_PublishedServerUrl
            value: "http://jellyfin.nas-local.io"
  destination:
    server: https://kubernetes.default.svc
    namespace: jellyfin
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
