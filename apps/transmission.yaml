apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: transmission
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://media-servarr.shw.al/charts
    chart: transmission
    targetRevision: 0.13.x
    helm:
      values: |
        application:
          port: 9091
          urlBase: ''
          config:
            filename: 'settings.json'
            mountPath: '/config/settings.json'
            contents: |
              {
                "alt-speed-down": 50,
                "alt-speed-enabled": false,
                "alt-speed-time-begin": 540,
                "alt-speed-time-day": 127,
                "alt-speed-time-enabled": false,
                "alt-speed-time-end": 1020,
                "alt-speed-up": 50,
                "announce-ip": "",
                "announce-ip-enabled": false,
                "anti-brute-force-enabled": false,
                "anti-brute-force-threshold": 100,
                "bind-address-ipv4": "0.0.0.0",
                "bind-address-ipv6": "::",
                "blocklist-enabled": true,
                "blocklist-url": "https://github.com/Naunter/BT_BlockLists/raw/master/bt_blocklists.gz",
                "cache-size-mb": 4,
                "default-trackers": "",
                "dht-enabled": true,
                "download-dir": "/data/downloads/complete",
                "download-queue-enabled": true,
                "download-queue-size": 5,
                "encryption": 1,
                "idle-seeding-limit": 30,
                "idle-seeding-limit-enabled": false,
                "incomplete-dir": "/data/downloads/incomplete",
                "incomplete-dir-enabled": true,
                "lpd-enabled": false,
                "message-level": 2,
                "peer-congestion-algorithm": "",
                "peer-id-ttl-hours": 6,
                "peer-limit-global": 300,
                "peer-limit-per-torrent": 50,
                "peer-port": 51413,
                "peer-port-random-high": 51413,
                "peer-port-random-low": 51413,
                "peer-port-random-on-start": false,
                "peer-socket-tos": "le",
                "pex-enabled": false,
                "port-forwarding-enabled": true,
                "preallocation": 1,
                "prefetch-enabled": true,
                "queue-stalled-enabled": true,
                "queue-stalled-minutes": 30,
                "ratio-limit": 2,
                "ratio-limit-enabled": false,
                "rename-partial-files": true,
                "rpc-authentication-required": false,
                "rpc-bind-address": "0.0.0.0",
                "rpc-enabled": true,
                "rpc-host-whitelist": "",
                "rpc-host-whitelist-enabled": false,
                "rpc-password": "$rpcPassword",
                "rpc-port": 9091,
                "rpc-socket-mode": "0750",
                "rpc-url": "/transmission/",
                "rpc-username": "",
                "rpc-whitelist": "",
                "rpc-whitelist-enabled": false,
                "scrape-paused-torrents-enabled": true,
                "script-torrent-added-enabled": false,
                "script-torrent-added-filename": "",
                "script-torrent-done-enabled": false,
                "script-torrent-done-filename": "",
                "script-torrent-done-seeding-enabled": false,
                "script-torrent-done-seeding-filename": "",
                "seed-queue-enabled": false,
                "seed-queue-size": 10,
                "speed-limit-down": 10024,
                "speed-limit-down-enabled": true,
                "speed-limit-up": 5012,
                "speed-limit-up-enabled": true,
                "start-added-torrents": true,
                "tcp-enabled": true,
                "torrent-added-verify-mode": "fast",
                "trash-original-torrent-files": false,
                "umask": "002",
                "upload-slots-per-torrent": 14,
                "utp-enabled": false,
                "watch-dir": "/watch",
                "watch-dir-enabled": true
              }
        deployment:
          container:
            image:
              repository: 'lscr.io/linuxserver/transmission'
            env:
              - name: 'PUID'
                value: '1000'
              - name: 'PGID'
                value: '1000'
              - name: 'TZ'
                value: 'Europe/Madrid'
            volumeMounts:
              - name: 'config'
                mountPath: '/config'
              - name: 'data'
                mountPath: '/data'
          volumes:
            config:
              persistentVolumeClaim:
                claimName: 'transmission-config'
            data:
              hostPath:
                path: /mnt/nas/Media
                type: Directory
        persistentVolumeClaims:
          transmission-config:
            accessMode: 'ReadWriteOnce'
            requestStorage: '1Gi'
            storageClassName: 'microk8s-hostpath'
            selector: {}
        service:
          type: ClusterIP
        ingress:
          enabled: true
          host: transmission.nas-local.io
          className: nginx
  destination:
    server: https://kubernetes.default.svc
    namespace: transmission
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
